<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FMCG AI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #09090f;
    --surface: #13131e;
    --border: #1e1e30;
    --accent: #00d4aa;
    --accent2: #7c3aed;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --danger: #ef4444;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }
  @keyframes gridMove { to { background-position: 60px 60px; } }

  /* Glowing orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    animation: float 8s ease-in-out infinite;
    pointer-events: none;
  }
  .orb-1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; }
  .orb-2 { width: 350px; height: 350px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: -4s; }
  @keyframes float {
    0%,100% { transform: translate(0,0); }
    50%      { transform: translate(20px, -20px); }
  }

  .login-wrapper {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 440px;
    padding: 20px;
    animation: slideUp .6s ease both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    backdrop-filter: blur(20px);
    box-shadow: 0 40px 80px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
  }

  .logo-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 32px;
    line-height: 1.2;
  }

  .field { margin-bottom: 20px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    transition: border-color .2s, box-shadow .2s;
    outline: none;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,170,.12);
  }

  .hint {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 24px;
    padding: 14px;
    background: rgba(0,212,170,.04);
    border: 1px solid rgba(0,212,170,.1);
    border-radius: 8px;
    line-height: 1.7;
  }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #00b894);
    border: none;
    border-radius: 10px;
    color: #0a1a16;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity .2s, transform .15s;
  }
  .btn-login:hover  { opacity: .9; transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }

  .error-msg {
    background: rgba(239,68,68,.08);
    border: 1px solid rgba(239,68,68,.3);
    border-radius: 8px;
    padding: 12px;
    color: #fca5a5;
    font-size: 13px;
    margin-top: 16px;
    display: none;
    animation: shake .3s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,.3);
    border-top-color: #0a1a16;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="login-wrapper">
  <div class="login-card">
    <div class="logo-bar">
      <div class="logo-icon">📦</div>
      <div class="logo-text">FMCG<span>AI</span></div>
    </div>

    <div class="tagline">Supply Intelligence Platform</div>
    <h1>Welcome Back</h1>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="error-msg" id="errMsg"></div>

    <div class="hint">
      🔑 <strong>Demo Credentials</strong><br/>
      Admin: <code>admin</code> / <code>admin123</code><br/>
      Analyst: <code>analyst</code> / <code>analyst123</code>
    </div>
  </div>
</div>

<script>
  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const btn  = document.getElementById('loginBtn');
    const err  = document.getElementById('errMsg');
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();

    if (!user || !pass) {
      showError('Please enter both username and password.');
      return;
    }

    btn.innerHTML = '<span class="spinner"></span>Authenticating…';
    btn.disabled  = true;
    err.style.display = 'none';

    try {
      const res  = await fetch('/api/login', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ username: user, password: pass }),
        credentials: 'include',
      });
      const data = await res.json();

      if (data.success) {
        btn.innerHTML = '✅ Redirecting…';
        window.location.href = data.redirect;
      } else {
        showError(data.message || 'Login failed.');
        btn.innerHTML = 'Sign In';
        btn.disabled  = false;
      }
    } catch {
      showError('Server unreachable. Is Flask running?');
      btn.innerHTML = 'Sign In';
      btn.disabled  = false;
    }
  }

  function showError(msg) {
    const err = document.getElementById('errMsg');
    err.textContent   = '⚠️ ' + msg;
    err.style.display = 'block';
  }
</script>
</body>
</html>
